    - paragraph [ref=f1e80]: Everything you need to know for a smooth, hassle-free arrival at Peridot Apartment.
    - code [ref=f1e86]: <!-- Timeline --> <div class="timeline"> <div class="tl-item"> <div class="tl-spine"><div class="tl-circle">1</div><div class="tl-line"></div></div> <div class="tl-body"> <div class="tl-step">Step 1</div> <div class="tl-title">Arrive</div> <div class="tl-desc">Head to <strong>Villa Mojca</strong>, Borovška cesta 99b, Kranjska Gora. Look for the building signage.</div> </div> </div> <div class="tl-item"> <div class="tl-spine"><div class="tl-circle">2</div><div class="tl-line"></div></div> <div class="tl-body"> <div class="tl-step">Step 2</div> <div class="tl-title">Find the Key Safe</div> <div class="tl-desc">The key safe is on the <strong>wall by the garage door, on the left side</strong>. Your access code will be sent via WhatsApp/SMS before arrival.</div> </div> </div> <div class="tl-item"> <div class="tl-spine"><div class="tl-circle">3</div><div class="tl-line"></div></div> <div class="tl-body"> <div class="tl-step">Step 3</div> <div class="tl-title">Open the Safe</div> <div class="tl-desc">Enter your code, open the safe and take the <strong>apartment keys</strong> and <strong>garage remote</strong>.</div> </div> </div> <div class="tl-item"> <div class="tl-spine"><div class="tl-circle">4</div><div class="tl-line"></div></div> <div class="tl-body"> <div class="tl-step">Step 4</div> <div class="tl-title">Garage Access</div> <div class="tl-desc">Use the remote to open the ramp first, then the garage door.</div> </div> </div> <div class="tl-item"> <div class="tl-spine"><div class="tl-circle">5</div><div class="tl-line"></div></div> <div class="tl-body"> <div class="tl-step">Step 5</div> <div class="tl-title">Your Parking Space</div> <div class="tl-desc">Your dedicated parking space is <strong>number 5 — on the left</strong>.</div> </div> </div> <div class="tl-item"> <div class="tl-spine"><div class="tl-circle">6</div></div> <div class="tl-body"> <div class="tl-step">Step 6</div> <div class="tl-title">Storage &amp; Bicycle Room</div> <div class="tl-desc">Your storage and bicycle room are also <strong>number 5</strong>, located in the garage.</div> </div> </div> </div> <!-- Photo grid --> <div class="photo-grid"> <div class="photo-card"> <img src="data:image/png;base64," alt="Key safe" style="width:100%;height:190px;object-fit:cover;display:block;"> <div class="photo-cap">Key safe</div> </div> <div class="photo-card"> <img src="data:image/jpeg;base64," alt="Garage" style="width:100%;height:190px;object-fit:cover;display:block;"> <div class="photo-cap">Garage interior</div> </div> <div class="photo-card"> <img src="data:image/jpeg;base64," alt="Terrace" style="width:100%;height:190px;object-fit:cover;display:block;"> <div class="photo-cap">Apartment terrace</div> </div> <div class="photo-card"> <img src="data:image/png;base64," alt="Bicycle & storage" style="width:100%;height:190px;object-fit:cover;display:block;"> <div class="photo-cap">Storage &amp; bicycle room</div> </div> </div>
